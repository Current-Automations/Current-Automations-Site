<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  :root {
    --bg-deep: #06101f; --bg-navy: #0b1828; --bg-card: #0f1f33;
    --ink-100: #ffffff; --ink-80: #cfe1f0; --ink-50: #7f95ad;
    --teal-100: #8cf0e0; --teal-200: #5dd6cb; --teal-300: #3bb6c7;
    --blue-400: #2e8fd6; --blue-500: #1e6ec4; --blue-600: #1652a8;
    --grad-wave: linear-gradient(90deg, #8cf0e0 0%, #3bb6c7 38%, #2e8fd6 75%, #1652a8 100%);
  }
  .stage { width: 100vw; height: 100vh; overflow: hidden; }
  .lockup { display: inline-flex; align-items: center; gap: var(--gap, 18px); color: var(--ink-100); }
  .lockup .mark { width: var(--mark, 72px); height: var(--mark, 72px); flex: 0 0 auto; display: block; }
  .lockup .mark img { width: 100%; height: 100%; display: block; }
  .wordmark { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.02em; line-height: 0.95; font-size: var(--word, 42px); white-space: nowrap; }
  .wordmark .current { color: var(--ink-100); }
  .wordmark .automations { color: var(--teal-200); font-weight: 500; }
  .wordmark .stack { display: flex; flex-direction: column; gap: 0.12em; }
  .tagline { font-family: 'Inter', sans-serif; color: var(--ink-50); font-size: var(--tag, 13px); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 0.55em; }

  .bg-deep   { background: var(--bg-deep); }
  .bg-navy   { background: radial-gradient(120% 100% at 10% 0%, #11293f 0%, #07111f 65%); }
  .bg-light  { background: #f3f6fa; color: #0b1828; }
  .bg-light .wordmark .current { color: #0b1828; }
  .bg-light .wordmark .automations { color: var(--teal-300); }
  .bg-light .tagline { color: #5a6b80; }

  .ab-lockup { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 0 64px; }

  .banner { position: relative; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(120% 140% at 12% 50%, #11304a 0%, #08152a 55%, #04091a 100%); display: flex; align-items: center; color: var(--ink-100); }
  .banner .grid-lines { position: absolute; inset: 0; background-image: linear-gradient(rgba(140,240,224,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(140,240,224,0.05) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(80% 100% at 70% 50%, #000 0%, transparent 75%); }
  .banner .stripes { position: absolute; right: -40px; top: 50%; width: 60%; height: 200%; transform: translateY(-50%) rotate(-12deg); background: repeating-linear-gradient(90deg, transparent 0 22px, rgba(59,182,199,0.08) 22px 23px, transparent 23px 60px, rgba(46,143,214,0.10) 60px 61px); mask-image: linear-gradient(90deg, transparent 0%, #000 30%, #000 80%, transparent 100%); }
  .banner .waves { position: absolute; right: 0; top: 0; height: 100%; width: 55%; display: flex; align-items: center; justify-content: flex-end; padding-right: 80px; }
  .banner .content { position: relative; z-index: 2; padding-left: 96px; max-width: 60%; }
  .banner .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border: 1px solid rgba(140,240,224,0.25); border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--teal-100); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
  .banner .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-100); box-shadow: 0 0 8px var(--teal-100); }
  .banner h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 500; color: var(--ink-100); font-size: 44px; line-height: 1.05; letter-spacing: -0.02em; margin: 0; }
  .banner h1 .accent { background: var(--grad-wave); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .banner .meta { margin-top: 24px; display: flex; align-items: center; gap: 28px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-50); letter-spacing: 0.1em; text-transform: uppercase; }
  .banner .meta span { display: inline-flex; align-items: center; gap: 8px; }
  .banner .meta .sep { color: rgba(140,240,224,0.4); }
  .banner-b { justify-content: center; text-align: center; }
  .banner-b .content { padding-left: 0; max-width: 900px; }
  .banner-b .lockup { margin: 0 auto 18px; }
  .banner-c { display: grid !important; grid-template-columns: 1.25fr 1fr; background: var(--bg-deep); }
  .banner-c .left { display: flex; flex-direction: column; justify-content: center; padding: 0 72px; background: radial-gradient(110% 130% at 0% 50%, #122c44 0%, #07111f 80%); }
  .banner-c .right { position: relative; overflow: hidden; background: linear-gradient(135deg, #06121f 0%, #0a2238 100%); border-left: 1px solid rgba(140,240,224,0.12); display: flex; align-items: center; justify-content: center; }
  .banner-c .right .halo { position: absolute; top: 50%; left: 50%; width: 360px; height: 360px; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(93,214,203,0.22) 0%, rgba(46,143,214,0.10) 40%, transparent 70%); filter: blur(2px); }
  .banner-c .right .corner { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(140,240,224,0.55); }
  .banner-c .right .corner.tl { top: 22px; left: 24px; }
  .banner-c .right .corner.br { bottom: 22px; right: 24px; color: var(--ink-50); }
</style>
</head>
